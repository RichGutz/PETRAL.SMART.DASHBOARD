<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APN Live Traffic Control</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap"
        rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">
        <!-- Floating Header -->
        <header class="top-bar">
            <div class="logo">
                <span class="pulse-icon"></span>
                <h1>APN <span class="highlight">LIVE</span> TRAFFIC</h1>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span> Sistemas Operativos
            </div>
        </header>

        <!-- Map Container -->
        <div id="map"></div>

        <!-- Floating Sidebar (Hidden by default, shows on click) -->
        <aside id="port-details" class="sidebar glass-panel hidden">
            <button class="close-btn" onclick="closeSidebar()">&times;</button>
            <h2 id="detail-title">Seleccione un Puerto</h2>
            <div class="radar-scan"></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="label">Naves en Puerto</span>
                    <span class="value" id="stat-ships">--</span>
                </div>
                <div class="stat-card">
                    <span class="label">Próx. Arribos</span>
                    <span class="value" id="stat-arrivals">--</span>
                </div>
                <div class="stat-card">
                    <span class="label">Operaciones</span>
                    <span class="value" id="stat-ops">Active</span>
                </div>
            </div>

            <div class="recent-activity">
                <h3>Tráfico Reciente</h3>
                <ul id="ship-list">
                    <li><span class="time">--:--</span> Esperando datos...</li>
                </ul>
            </div>
        </aside>

        <!-- Legend / Controls -->
        <div class="controls glass-panel">
            <button class="btn-control active" onclick="setMapFilter('all')">Todos</button>
            <button class="btn-control" onclick="setMapFilter('north')">Norte</button>
            <button class="btn-control" onclick="setMapFilter('center')">Centro</button>
            <button class="btn-control" onclick="setMapFilter('south')">Sur</button>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <!-- GeoJSON Data -->
    <script src="peru_geo.js"></script>

    <!-- Real-Time Ship Data -->
    <script src="ships_data.js"></script>

    <!-- Mining Projects Data -->
    <script src="mines_data.js"></script>
    <script src="terrain_data.js"></script>
    <script src="south_corridor_data.js"></script>
    <script src="infrastructure_roads.js"></script>
    <script src="road_pe30b.js"></script>
    <script src="road_pe30a.js"></script>

    <!-- App Logic -->
    <script src="script.js"></script>
</body>

</html>
